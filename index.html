<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Voice - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style-login.css">
</head>
<body>
    <div class="login-box">
        <div class="logo">
        </div>

        <p class="tagline">
            Wadah aspirasi digital mahasiswa.<br>
            Suara didengar, perubahan dimulai.
        </p>

        <form id="loginForm">
            <div class="input-group">
                <label for="nim">NIM</label>
                <input type="text" id="nim" placeholder="Masukkan NIM">
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Masukkan Password">
            </div>

            <p class="message" id="error-message"></p>

            <button type="submit">Login</button>
        </form>

        <p class="footer-text">Ruang bersama untuk perubahan kampus.</p>

        <a href="feed.html" class="skip-link">Lanjut ke Feed →</a>
    </div>

    <script src="script-login.js"></script>
</body>
</html>
